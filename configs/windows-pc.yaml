# windows-pc.yaml — example config for a Windows workstation.
#
# Copy to %APPDATA%\desk-agent\config.yaml on the target machine and adjust.
# The token is read from the DESK_AGENT_TOKEN env var (token_env below).
# Set that in the scheduled-task definition, never commit the actual value.

listen: "0.0.0.0:8765"
token_env: "DESK_AGENT_TOKEN"
run_timeout: "60s"

actions:
  displays_tv:
    script: monitors.ps1
    args: ["layout-tv"]
    description: "TV aktivieren, als Hauptanzeige setzen und Samsung-Monitore deaktivieren"

  displays_samsung:
    script: monitors.ps1
    args: ["layout-samsung"]
    description: "Samsung-Monitore aktivieren und TV deaktivieren"

  samsung1_toggle:
    script: monitors.ps1
    args: ["toggle-enabled", "samsung1"]
    description: "Samsung 1 aktivieren/deaktivieren"

  samsung2_toggle:
    script: monitors.ps1
    args: ["toggle-enabled", "samsung2"]
    description: "Samsung 2 aktivieren/deaktivieren"

  samsung1_primary:
    script: monitors.ps1
    args: ["set-primary", "samsung1"]
    description: "Samsung 1 als Hauptanzeige setzen"

  samsung2_primary:
    script: monitors.ps1
    args: ["set-primary", "samsung2"]
    description: "Samsung 2 als Hauptanzeige setzen"

  samsung1_hz_toggle:
    script: monitors.ps1
    args: ["toggle-refresh", "samsung1", "120", "360"]
    description: "Samsung 1 zwischen 120 Hz und 360 Hz umschalten"

  samsung2_hz_toggle:
    script: monitors.ps1
    args: ["toggle-refresh", "samsung2", "120", "240"]
    description: "Samsung 2 zwischen 120 Hz und 240 Hz umschalten"

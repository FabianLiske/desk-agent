version: '3'

vars:
  BINARY: desk-agent
  MODULE: github.com/fabianliske/desk-agent
  DIST: dist
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

env:
  CGO_ENABLED: '0'

tasks:
  default:
    desc: Show available tasks.
    cmds:
      - task --list-all

  tidy:
    desc: Run go mod tidy.
    cmds:
      - go mod tidy

  fmt:
    desc: Format all Go code.
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet.
    cmds:
      - go vet ./...

  test:
    desc: Run all unit tests.
    cmds:
      - go test ./... -count=1

  run:
    desc: Run desk-agent from source.
    cmds:
      - go run ./cmd/desk-agent {{.CLI_ARGS}}

  build:
    desc: Build the native binary into ./dist/.
    cmds:
      - mkdir -p {{.DIST}}
      - >-
        go build -trimpath
        -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}"
        -o {{.DIST}}/{{.BINARY}}{{exeExt}} ./cmd/desk-agent

  build:windows:
    desc: Cross-build for Windows amd64.
    env:
      GOOS: windows
      GOARCH: amd64
    cmds:
      - mkdir -p {{.DIST}}
      - >-
        go build -trimpath
        -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}"
        -o {{.DIST}}/{{.BINARY}}-windows-amd64.exe ./cmd/desk-agent

  build:linux:
    desc: Cross-build for Linux amd64.
    env:
      GOOS: linux
      GOARCH: amd64
    cmds:
      - mkdir -p {{.DIST}}
      - >-
        go build -trimpath
        -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}"
        -o {{.DIST}}/{{.BINARY}}-linux-amd64 ./cmd/desk-agent

  build:all:
    desc: Cross-build for both target platforms.
    deps: [build:windows, build:linux]

  clean:
    desc: Remove build artifacts.
    cmds:
      - rm -rf {{.DIST}}
